version: 2

project_name: mindspec

before:
  hooks:
    - go mod tidy
    - go vet ./...

builds:
  - main: ./cmd/mindspec
    binary: mindspec
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.ShortCommit}} -X main.date={{.Date}}

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^Merge"

release:
  github:
    owner: mrmaxsteel
    name: mindspec

# Cosign keyless signing — spec 090 Bead 2 / ADR-0029.
# Two entries: one signs each release archive, one signs `checksums.txt`.
# `${artifact}` is the GoReleaser-substituted artifact filename.
#
# GoReleaser v2's `signs:` block tracks and uploads only the files named
# by `signature:` and `certificate:`. There is no field to register a
# third `.cosign.bundle` output, so a `--bundle=...` file would be
# written on the runner and then silently discarded (never attached to
# the release) — exactly what happened in v0.8.0. The verification path
# therefore uses the uploaded `.sig` + `.pem` pair (see SECURITY.md), and
# the dead `--bundle` flag is intentionally absent here.
signs:
  - id: archives
    cmd: cosign
    signature: "${artifact}.sig"
    certificate: "${artifact}.pem"
    args:
      - "sign-blob"
      - "--yes"
      - "--output-signature=${artifact}.sig"
      - "--output-certificate=${artifact}.pem"
      - "${artifact}"
    artifacts: archive
  - id: checksums
    cmd: cosign
    signature: "${artifact}.sig"
    certificate: "${artifact}.pem"
    args:
      - "sign-blob"
      - "--yes"
      - "--output-signature=${artifact}.sig"
      - "--output-certificate=${artifact}.pem"
      - "${artifact}"
    artifacts: checksum

# Syft SBOM generation — SPDX-JSON per archive and per checksums file.
# Two entries mirroring the `signs:` shape; each produces
# `${artifact}.spdx.json`.
sboms:
  # GoReleaser v2.15's `sboms.artifacts` enum accepts only
  # archive / binary / source / package / any (NOT `checksum`).
  # The checksums.txt file is still signed by the `signs:` block
  # below; SBOM coverage applies to archives only, which is the
  # ecosystem norm (an SBOM of a checksum manifest carries no
  # additional content beyond the manifest itself).
  # Surfaced by PR #112 panel-final via dryrun-on-introducing-PR:
  # GoReleaser exits 1 with
  #   "invalid list of artifacts to catalog: checksum"
  # when the second entry below was present.
  - id: archives
    cmd: syft
    args:
      - "scan"
      - "${artifact}"
      - "-o"
      - "spdx-json=${document}"
    documents:
      - "${artifact}.spdx.json"
    artifacts: archive
