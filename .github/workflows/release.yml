name: Release

on:
  push:
    tags:
      - "v*"

# `contents: write` is preserved (required by GoReleaser's release upload).
# `id-token: write` is added so cosign keyless can mint a Fulcio cert
# bound to this workflow's OIDC identity (spec 090 Bead 2, ADR-0029).
permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: GoReleaser
    runs-on: ubuntu-latest
    steps:
      # Every `uses:` is pinned to a 40-char commit SHA per spec 090 Bead 2
      # (ADR-0029) so a compromised upstream action cannot silently change
      # signing behavior. The trailing `# vX.Y.Z` annotation names the
      # release the SHA corresponds to.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: "1.22"

      # Install cosign so GoReleaser's `signs:` block can invoke `cosign
      # sign-blob` for every archive and the checksums file. Keyless mode
      # is selected implicitly by the absence of `--key`; the OIDC token
      # granted by `id-token: write` above provides the identity.
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2
        with:
          cosign-release: "v2.4.1"

      # Install syft so GoReleaser's `sboms:` block can invoke `syft scan`
      # for every archive and the checksums file (SPDX-JSON output).
      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89  # v7.2.2
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
