# Release Dryrun — PR-time structural gate for the release pipeline.
#
# This workflow self-triggers on PRs that modify any of the release-infra
# files enumerated in `on.pull_request.paths` below. It runs GoReleaser in
# snapshot mode, then manually invokes cosign and syft against the produced
# archives (because `goreleaser --snapshot` skips the `signs:` block by
# default — see https://goreleaser.com/customization/sign/), then asserts
# that every expected `.sig` / `.pem` / `.spdx.json` side-car exists and is
# non-empty, and that each SBOM contains an `spdxVersion` field. (The
# `.goreleaser.yml` `signs:` block uploads only `.sig` + `.pem`; GoReleaser
# v2 has no `.cosign.bundle` upload field — see bug mindspec-4kfm.)
#
# Per spec 090 Bead 3 (panel revision 8): the trigger is `pull_request`.
# The intentionally-rejected privileged sibling event (the one whose name
# is `pull_request` followed by an underscore and "target") would let a
# same-repo collaborator exfiltrate the OIDC token via a malicious edit to
# this YAML itself; we do not use it. PR-head checkout is safe here
# because the dryrun's OIDC subject
# (`…/release-dryrun.yml@refs/pull/<N>/merge`) cannot satisfy the
# production identity regex enforced by reviewer-runnable
# `cosign verify-blob` on real tag artifacts.
#
# The same-repo job-level `if:` gate (spec Requirement #4) drops PRs from
# forks, which cannot mint a usable OIDC token. Forks fail-soft (job is
# skipped, not failed).
#
# All `uses:` lines are 40-char SHA-pinned and MUST match the SHAs in
# `release.yml` (drift would mean the dryrun is testing a different
# toolchain than production). A future Renovate rule, if added, must
# rotate both files together.
#
# NOTE: any future `release-*.yml` sibling workflow added later requires
# an explicit addition to the `paths:` list below — GitHub Actions does
# not glob across sibling files without `**`.

name: Release Dryrun

on:
  pull_request:
    paths:
      - .github/workflows/release.yml
      - .github/workflows/release-dryrun.yml
      - .goreleaser.yml
      - SECURITY.md
      - .github/actions/**

# `contents: read` to checkout the PR head.
# `id-token: write` so cosign sign-blob can mint a Fulcio cert against the
# snapshot artifacts; the cert won't satisfy the production identity regex,
# but the signing operation itself must succeed for the structural
# assertions below to be meaningful (spec 090 Bead 3 step 1).
permissions:
  contents: read
  id-token: write

jobs:
  release-dryrun:
    name: Snapshot + structural verify
    runs-on: ubuntu-latest
    # Same-repo gate (spec Requirement #4, panel revision 8). Placed at
    # the JOB level so `id-token: write` is never exposed to fork PRs.
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      # SHAs below MUST match the corresponding SHAs in release.yml.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      # go-version: must match release.yml's setup-go input
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: "1.23"

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2
        with:
          # Pinned to v2.6.3 in lockstep with release.yml — anything older
          # fails goreleaser-action v7.x's startup self-verify with
          # "bundle does not contain cert for verification". See PR #112
          # panel-final blocker for the surfacing of this on the
          # introducing dryrun run.
          cosign-release: "v2.6.3"

      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0

      - name: Run GoReleaser (snapshot)
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89  # v7.2.2
        with:
          version: "~> v2"
          args: release --snapshot --skip=publish --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Block A — Manual sign + SBOM (spec 090 Bead 3 step 2 / panel
      # revision 3). `goreleaser --snapshot` skips `signs:` by default,
      # so cosign and syft are invoked directly here. `--tlog-upload=false`
      # is mandatory (panel revision 3, R5:C5) so PR-context Fulcio certs
      # do not pollute the public Rekor transparency log.
      #
      # Symmetry with .goreleaser.yml: cosign signs archives AND
      # checksums.txt; syft scans archives only. The `sboms.artifacts`
      # enum in GoReleaser v2.15 does not accept `checksum`, and an SBOM
      # of a checksum manifest carries no additional content beyond the
      # manifest itself. Surfaced by PR #112 panel-final dryrun.
      - name: Manual cosign sign-blob (archives + checksums.txt)
        env:
          COSIGN_YES: "true"
        run: |
          set -euo pipefail
          shopt -s nullglob
          sign_targets=( dist/mindspec_*.tar.gz dist/mindspec_*.zip dist/checksums.txt )
          for artifact in "${sign_targets[@]}"; do
            [ -f "$artifact" ] || continue
            cosign sign-blob \
              --yes \
              --tlog-upload=false \
              --output-signature="${artifact}.sig" \
              --output-certificate="${artifact}.pem" \
              "$artifact"
          done

      - name: Manual syft SBOM (archives only)
        run: |
          set -euo pipefail
          shopt -s nullglob
          sbom_targets=( dist/mindspec_*.tar.gz dist/mindspec_*.zip )
          for artifact in "${sbom_targets[@]}"; do
            [ -f "$artifact" ] || continue
            syft scan "$artifact" -o spdx-json="${artifact}.spdx.json"
          done

      # Block B — Structural assertion (spec 090 Bead 3 step 2, covers
      # spec Requirement #4 a–c).
      #
      # Assertion shape mirrors the per-artifact-class division above and
      # the `.goreleaser.yml` `signs:` outputs. GoReleaser v2 tracks/uploads
      # only the `signature:` (.sig) and `certificate:` (.pem) files — there
      # is no `.cosign.bundle` upload (see bug mindspec-4kfm), so the dryrun
      # asserts the side-cars the real release actually publishes:
      #   - archives (.tar.gz / .zip) must have .sig + .pem + .spdx.json
      #   - checksums.txt must have .sig + .pem only (no .spdx.json)
      - name: Assert side-car presence + SPDX validity
        run: |
          set -euo pipefail
          shopt -s nullglob
          archives=( dist/mindspec_*.tar.gz dist/mindspec_*.zip )
          if [ ${#archives[@]} -eq 0 ]; then
            echo "no archives found in dist/ — goreleaser snapshot produced nothing"
            exit 1
          fi
          for archive in "${archives[@]}"; do
            [ -f "$archive" ] || continue
            [ -s "${archive}.sig" ]       || { echo "missing ${archive}.sig"; exit 1; }
            [ -s "${archive}.pem" ]       || { echo "missing ${archive}.pem"; exit 1; }
            [ -s "${archive}.spdx.json" ] || { echo "missing ${archive}.spdx.json"; exit 1; }
            jq -e '.spdxVersion' "${archive}.spdx.json" >/dev/null \
              || { echo "invalid SPDX in ${archive}.spdx.json"; exit 1; }
          done
          checksums="dist/checksums.txt"
          if [ -f "$checksums" ]; then
            [ -s "${checksums}.sig" ] || { echo "missing ${checksums}.sig"; exit 1; }
            [ -s "${checksums}.pem" ] || { echo "missing ${checksums}.pem"; exit 1; }
          fi
          echo "release-dryrun: ${#archives[@]} archives + checksums.txt verified"
