name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Spec 084 (mindspec-otel-only) simplified CI:
#
# All spec-083 sibling-materialization steps (`make checkout-agentmind`,
# `verify-agentmind-tag.sh`, `test-e-continuity.sh`, `live-capture`)
# were removed when spec 084 dropped the `github.com/mrmaxsteel/agentmind`
# Go-module dependency from `go.mod`. mindspec no longer requires the
# sibling repo to build, test, lint, vet, or tidy.
#
# The permanent CI gate against re-introduction of the dep is the
# specgate test at `internal/specgate/verify_no_agentmind_dep_test.go`,
# which runs in the regular `go test -short ./...` invocation below.
# See ADR-0027 for the architectural rationale.

jobs:
  # HC-1 keystone (spec 094): the adversarial redaction golden-corpus gate
  # runs as its OWN dedicated, always-run job — not merely a step inside
  # `test` — so a redaction leak is a distinct, required, non-skippable
  # status that can never be masked by an unrelated matrix entry
  # (codex-completeness). It has no `if:` guard and no continue-on-error,
  # and runs `-race` over the whole redact + version surface including the
  # per-pass mutation gate and the subprocess falsifiability proof.
  redaction-gate:
    name: Redaction gate (spec 094 HC-1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: Redaction + version privacy gate
        run: go test -race ./internal/redact/... ./internal/version/...

  test:
    name: Test (Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.22", "1.23"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      # HC-1 keystone (spec 094): the adversarial redaction golden-corpus
      # gate, ALSO run inline here (in addition to the dedicated
      # redaction-gate job above and `./...` below) so a redaction leak
      # fails the build loudly and visibly, never as an advisory.
      - name: Redaction golden-corpus gate (spec 094 HC-1)
        run: go test ./internal/redact/...

      - name: Run tests
        run: go test -short -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage
        if: matrix.go-version == '1.22'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build binary
        run: make build

      - name: Verify binary runs
        run: ./bin/mindspec --help

      # Spec 119 (AC-11): mindspec doctor over its own repo, in-binary,
      # non-zero exit fails the build. Checks are best-effort/read-only
      # where they depend on `bd` (not installed on this runner), so this
      # is safe to run unconditionally.
      - name: mindspec doctor
        run: ./bin/mindspec doctor

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: mindspec-linux-amd64
          path: ./bin/mindspec

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: "v2.1"

  vet:
    name: Vet & Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: go vet
        run: go vet ./...

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l . | grep -v '^beads/' || true)
          if [ -n "$unformatted" ]; then
            echo "::error::Files not formatted with gofmt:"
            echo "$unformatted"
            exit 1
          fi

  tidy:
    name: Module Tidy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Check go.mod is tidy
        run: |
          go mod tidy
          if ! git diff --exit-code go.mod go.sum; then
            echo "::error::go.mod or go.sum is not tidy. Run 'go mod tidy' and commit."
            exit 1
          fi
