name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Spec 083 Bead 2: every job that compiles Go must first run
# `scripts/checkout-agentmind.sh` (via `make checkout-agentmind`) so the
# `replace github.com/mrmaxsteel/agentmind => ../agentmind` directive
# resolves to a real sibling and `go build` succeeds. The script also
# writes a gitignored go.work file pinning the sibling via an absolute
# path so worktree depth does not affect resolution. CI sets
# MINDSPEC_REQUIRE_SIBLING=1 so the companion specgate test fails
# rather than skips when the sibling is missing.

env:
  MINDSPEC_REQUIRE_SIBLING: "1"

jobs:
  test:
    name: Test (Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.22", "1.23"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Materialize agentmind sibling
        run: make checkout-agentmind

      - name: Run tests
        run: go test -short -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage
        if: matrix.go-version == '1.22'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Materialize agentmind sibling
        run: make checkout-agentmind

      - name: Build binary
        run: make build

      - name: Verify binary runs
        run: ./bin/mindspec --help

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: mindspec-linux-amd64
          path: ./bin/mindspec

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Materialize agentmind sibling
        run: make checkout-agentmind

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: "v2.1"

  vet:
    name: Vet & Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Materialize agentmind sibling
        run: make checkout-agentmind

      - name: go vet
        run: go vet ./...

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l . | grep -v '^beads/' || true)
          if [ -n "$unformatted" ]; then
            echo "::error::Files not formatted with gofmt:"
            echo "$unformatted"
            exit 1
          fi

  tidy:
    name: Module Tidy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Materialize agentmind sibling
        run: make checkout-agentmind

      - name: Check go.mod is tidy
        run: |
          go mod tidy
          if ! git diff --exit-code go.mod go.sum; then
            echo "::error::go.mod or go.sum is not tidy. Run 'go mod tidy' and commit."
            exit 1
          fi

  # Spec 083 Bead 4 — Test D (live capture) gate. End-to-end:
  # build the in-repo cmd/agentmind-fake (stand-in for the real
  # binary until agentmind v0.2.0+ ships), set $AGENTMIND_BIN,
  # invoke `make test-live-capture` (which runs the
  # `livecapture`-tagged Go test that spawns the binary, POSTs a
  # synthetic OTLP payload, and asserts NDJSON event capture).
  #
  # Gated on Test G via `make verify-agentmind-tag`: when the
  # agentmind v0.0.1 tag is absent upstream, the verify step exits
  # non-zero with a clear deferral message and we skip the live-
  # capture job rather than fail. Once upstream publishes the tag
  # and a real binary becomes available, set
  # AGENTMIND_REAL_BINARY=1 to upgrade the assertion to the
  # spec-canonical `claude_code.api_request` event check.
  live-capture:
    name: Live capture (Test D)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Materialize agentmind sibling
        run: make checkout-agentmind

      - name: Test G — verify agentmind v0.0.1 tag (gate)
        id: testg
        run: |
          set +e
          ./scripts/verify-agentmind-tag.sh
          rc=$?
          echo "verify-agentmind-tag exit=$rc"
          echo "rc=$rc" >> "$GITHUB_OUTPUT"
          # Exit 0/2/3 are all acceptable to the job — 0 lets us run,
          # 2/3 cause the live-capture step to skip with a notice.
          if [ "$rc" -ne 0 ] && [ "$rc" -ne 2 ] && [ "$rc" -ne 3 ]; then
            echo "::error::verify-agentmind-tag.sh failed unexpectedly (rc=$rc)"
            exit "$rc"
          fi

      - name: Run live-capture gate (Test D)
        if: steps.testg.outputs.rc == '0'
        run: make test-live-capture

      - name: Skip live-capture (Test G deferred)
        if: steps.testg.outputs.rc != '0'
        run: |
          echo "::notice::Test G (agentmind v0.0.1 tag) is deferred (rc=${{ steps.testg.outputs.rc }}); skipping live-capture per spec 083 Bead 4 step 5 (defensive gating)."
